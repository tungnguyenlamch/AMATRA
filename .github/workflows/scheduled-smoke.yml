name: scheduled-smoke

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  model-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install app and research dependencies
        run: uv pip install --system -e ".[app,research]"
      - name: Translator construction smoke
        run: python -m amatra.cli smoke
